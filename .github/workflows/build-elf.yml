name: Build Cheat Toolbox ELF

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-elf:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang llvm file build-essential git ca-certificates

      - name: Resolve PS5 payload SDK path
        run: |
          set -euo pipefail
          SDK_DIR="$GITHUB_WORKSPACE/external/ps5-payload-sdk"
          rm -rf "$SDK_DIR"
          mkdir -p "$(dirname "$SDK_DIR")"
          git clone --depth 1 --recurse-submodules https://github.com/ps5-payload-dev/sdk "$SDK_DIR"
          echo "PS5_PAYLOAD_SDK=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Configure and build ELF
        run: |
          set -euo pipefail
          REPO_ROOT="$GITHUB_WORKSPACE"
          SOURCE_DIR="$REPO_ROOT/Source Code"
          BUILD_DIR="$REPO_ROOT/build/ps5-release"
          SDK_DIR="$PS5_PAYLOAD_SDK"
          TOOLCHAIN_FILE="$SDK_DIR/cmake/toolchain-ps5.cmake"

          pwd
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PS5_PAYLOAD_SDK=$PS5_PAYLOAD_SDK"
          echo "SOURCE_DIR=$SOURCE_DIR"
          echo "BUILD_DIR=$BUILD_DIR"
          echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE"
          ls -la "$SOURCE_DIR"
          ls -la "$(dirname "$TOOLCHAIN_FILE")"

          test -d "$SOURCE_DIR"
          test -d "$SDK_DIR"
          test -f "$TOOLCHAIN_FILE" || {
            echo "Missing toolchain file: $TOOLCHAIN_FILE" >&2
            find "$GITHUB_WORKSPACE" -name "toolchain-ps5.cmake" -print
            exit 1
          }

          cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

          cmake --build "$BUILD_DIR" --config Release --verbose

      - name: Verify ELF outputs
        run: |
          set -euo pipefail
          REPO_ROOT="$GITHUB_WORKSPACE"
          SOURCE_DIR="$REPO_ROOT/Source Code"
          BUILD_DIR="$REPO_ROOT/build/ps5-release"

          mapfile -t elfs < <(find "$BUILD_DIR" "$SOURCE_DIR" -type f \( -name "*.elf" -o -name "*.ELF" \) | sort)
          if [ ${#elfs[@]} -eq 0 ]; then
            echo "No ELF files found in $BUILD_DIR or $SOURCE_DIR" >&2
            exit 1
          fi

          for elf in "${elfs[@]}"; do
            ls -lh "$elf"
            file "$elf" || true
            sha256sum "$elf"
          done

          printf '%s\n' "${elfs[@]}" > "$REPO_ROOT/elf-artifacts.txt"

      - name: Upload ELF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cheat-toolbox-elf
          path: |
            ${{ github.workspace }}/elf-artifacts.txt
            ${{ github.workspace }}/build/ps5-release/**/*.elf
            ${{ github.workspace }}/build/ps5-release/**/*.ELF
            ${{ github.workspace }}/Source Code/**/*.elf
            ${{ github.workspace }}/Source Code/**/*.ELF
          if-no-files-found: error
          retention-days: 14
