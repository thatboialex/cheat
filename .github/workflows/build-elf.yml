name: Build Cheat Toolbox ELF

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-elf:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang llvm file build-essential git ca-certificates

      - name: Clone PS5 payload SDK
        run: |
          set -euo pipefail
          SDK_DIR="$GITHUB_WORKSPACE/external/ps5-payload-sdk"
          rm -rf "$SDK_DIR"
          mkdir -p "$(dirname "$SDK_DIR")"
          git clone --depth 1 --recurse-submodules https://github.com/ps5-payload-dev/sdk "$SDK_DIR"
          echo "PS5_PAYLOAD_SDK=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Diagnose build and SDK layout
        run: |
          set -euo pipefail
          REPO_ROOT="$GITHUB_WORKSPACE"
          SOURCE_DIR="$REPO_ROOT/ci-src"
          BUILD_DIR="$REPO_ROOT/build/ps5-release"
          SDK_DIR="$PS5_PAYLOAD_SDK"

          rm -rf "$SOURCE_DIR"
          rsync -a --delete "$REPO_ROOT/Source Code/" "$SOURCE_DIR/"

          echo "pwd=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "REPO_ROOT=$REPO_ROOT"
          echo "SOURCE_DIR=$SOURCE_DIR"
          echo "BUILD_DIR=$BUILD_DIR"
          echo "PS5_PAYLOAD_SDK=$PS5_PAYLOAD_SDK"
          echo "TOOLCHAIN_FILE=$SOURCE_DIR/stubber/toolchain.cmake"

          test -d "$SOURCE_DIR"
          test -d "$SDK_DIR"
          test -f "$SOURCE_DIR/CMakeLists.txt"
          test -f "$SOURCE_DIR/linker.x"
          test -f "$SOURCE_DIR/stubber/toolchain.cmake"
          find "$PS5_PAYLOAD_SDK" -maxdepth 3 -type d | sort | head -100

          echo "=== Repo build-related files ==="
          find "$REPO_ROOT" -maxdepth 4 -type f | sort | sed "s#^$REPO_ROOT/##" | grep -E '(^|/)(CMakeLists.txt|CMakePresets.json|Makefile|.*\.cmake|.*\.sh|linker\.x|\.github/workflows/.*\.yml)$' || true

          echo "=== SDK root listing (maxdepth 3, first 200 files) ==="
          find "$SDK_DIR" -maxdepth 3 -type f | sort | head -200

          echo "=== SDK build-helper files ==="
          find "$SDK_DIR" -maxdepth 6 -type f \( -name "*toolchain*.cmake" -o -name "*.cmake" -o -name "Makefile" -o -name "*.sh" \) -print | sort

      - name: Configure and build ELF
        run: |
          set -euo pipefail
          REPO_ROOT="$GITHUB_WORKSPACE"
          SOURCE_DIR="$REPO_ROOT/ci-src"
          BUILD_DIR="$REPO_ROOT/build/ps5-release"
          SDK_DIR="$PS5_PAYLOAD_SDK"

          rm -rf "$SOURCE_DIR"
          rsync -a --delete "$REPO_ROOT/Source Code/" "$SOURCE_DIR/"

          test -d "$SOURCE_DIR" || { echo "Missing source dir: $SOURCE_DIR" >&2; exit 1; }
          test -d "$SDK_DIR" || { echo "Missing SDK dir: $SDK_DIR" >&2; exit 1; }

          REPO_TOOLCHAIN="$SOURCE_DIR/stubber/toolchain.cmake"
          SDK_TOOLCHAIN=""
          if [ -d "$SDK_DIR" ]; then
            SDK_TOOLCHAIN="$(find "$SDK_DIR" -maxdepth 8 -type f -name 'toolchain-ps5.cmake' | head -n1 || true)"
          fi

          CONFIGURE_CMD=""
          if [ -n "$SDK_TOOLCHAIN" ] && [ -f "$SDK_TOOLCHAIN" ]; then
            echo "Using SDK toolchain file: $SDK_TOOLCHAIN"
            CONFIGURE_CMD="cmake -S \"$SOURCE_DIR\" -B \"$BUILD_DIR\" -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=\"$SDK_TOOLCHAIN\" -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DPS5_PAYLOAD_SDK=\"$SDK_DIR\""
          elif [ -x "$SDK_DIR/bin/prospero-cmake" ]; then
            echo "Using SDK wrapper: $SDK_DIR/bin/prospero-cmake"
            CONFIGURE_CMD="\"$SDK_DIR/bin/prospero-cmake\" -S \"$SOURCE_DIR\" -B \"$BUILD_DIR\" -G Ninja -DCMAKE_BUILD_TYPE=Release -DPS5_PAYLOAD_SDK=\"$SDK_DIR\""
          elif [ -f "$REPO_TOOLCHAIN" ]; then
            echo "Using repository toolchain file: $REPO_TOOLCHAIN"
            CONFIGURE_CMD="cmake -S \"$SOURCE_DIR\" -B \"$BUILD_DIR\" -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=\"$REPO_TOOLCHAIN\" -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DPS5_PAYLOAD_SDK=\"$SDK_DIR\""
          else
            echo "ERROR: no valid PS5 configure path found." >&2
            echo "pwd=$(pwd)" >&2
            echo "PS5_PAYLOAD_SDK=$PS5_PAYLOAD_SDK" >&2
            echo "Repo cmake files:" >&2
            find "$REPO_ROOT" -maxdepth 5 -type f \( -name "*.cmake" -o -name "CMakeLists.txt" -o -name "CMakePresets.json" -o -name "*.sh" \) | sort >&2
            echo "SDK helper files:" >&2
            find "$SDK_DIR" -maxdepth 8 -type f \( -name "*toolchain*.cmake" -o -name "*.cmake" -o -name "Makefile" -o -name "*.sh" \) | sort >&2
            exit 1
          fi

          pwd
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PS5_PAYLOAD_SDK=$PS5_PAYLOAD_SDK"
          echo "SOURCE_DIR=$SOURCE_DIR"
          echo "BUILD_DIR=$BUILD_DIR"
          echo "TOOLCHAIN_FILE=$REPO_TOOLCHAIN"
          test -d "$PS5_PAYLOAD_SDK"
          test -d "$SOURCE_DIR"
          test -f "$SOURCE_DIR/CMakeLists.txt"
          test -f "$SOURCE_DIR/linker.x"
          test -f "$REPO_TOOLCHAIN"

          echo "Configure command: $CONFIGURE_CMD"
          eval "$CONFIGURE_CMD"
          cmake --build "$BUILD_DIR" --config Release --verbose

      - name: Verify ELF outputs
        run: |
          set -euo pipefail
          REPO_ROOT="$GITHUB_WORKSPACE"
          SOURCE_DIR="$REPO_ROOT/ci-src"
          BUILD_DIR="$REPO_ROOT/build/ps5-release"

          mapfile -t elfs < <(find "$BUILD_DIR" "$SOURCE_DIR" -type f \( -name "*.elf" -o -name "*.ELF" \) | sort)
          if [ ${#elfs[@]} -eq 0 ]; then
            echo "No ELF files found after successful build." >&2
            echo "Searched: $BUILD_DIR and $SOURCE_DIR" >&2
            exit 1
          fi

          for elf in "${elfs[@]}"; do
            ls -lh "$elf"
            file "$elf" || true
            sha256sum "$elf"
          done

          printf '%s\n' "${elfs[@]}" > "$REPO_ROOT/elf-artifacts.txt"

      - name: Upload ELF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cheat-toolbox-elf
          path: |
            ${{ github.workspace }}/elf-artifacts.txt
            ${{ github.workspace }}/build/ps5-release/**/*.elf
            ${{ github.workspace }}/build/ps5-release/**/*.ELF
            ${{ github.workspace }}/ci-src/**/*.elf
            ${{ github.workspace }}/ci-src/**/*.ELF
          if-no-files-found: error
          retention-days: 14
