name: Build Cheat Toolbox ELF

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PS5_PAYLOAD_SDK: ${{ github.workspace }}/external/ps5-payload-sdk

jobs:
  build-elf:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-18 lld-18 llvm-18 llvm-18-dev \
            libc++-18-dev libc++abi-18-dev libunwind-18-dev \
            file build-essential git ca-certificates wget rsync python3
          sudo update-alternatives --install /usr/bin/clang        clang        /usr/bin/clang-18        100 || true
          sudo update-alternatives --install /usr/bin/clang++      clang++      /usr/bin/clang++-18      100 || true
          sudo update-alternatives --install /usr/bin/llvm-config  llvm-config  /usr/bin/llvm-config-18  100 || true
          sudo update-alternatives --install /usr/bin/lld          lld          /usr/bin/lld-18          100 || true
          clang --version
          llvm-config --version

      - name: Clone PS5 payload SDK
        run: |
          set -euo pipefail
          SDK_DIR="${PS5_PAYLOAD_SDK}"
          rm -rf "$SDK_DIR"
          mkdir -p "$(dirname "$SDK_DIR")"
          git clone --depth 1 --recurse-submodules \
            https://github.com/ps5-payload-dev/sdk "$SDK_DIR"
          git -C "$SDK_DIR" submodule update --init --recursive || true

      - name: Cache PS5 SDK target tree (libcxx is expensive to rebuild)
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PS5_PAYLOAD_SDK }}/target
            ${{ env.PS5_PAYLOAD_SDK }}/bin
            ${{ env.PS5_PAYLOAD_SDK }}/ldscripts
            ${{ env.PS5_PAYLOAD_SDK }}/toolchain
          key: ps5-payload-sdk-${{ runner.os }}-${{ hashFiles('external/ps5-payload-sdk/**/Makefile', 'external/ps5-payload-sdk/libcxx.sh') }}

      - name: Build and install PS5 SDK target tree
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          SDK_DIR="${PS5_PAYLOAD_SDK}"
          # Install the SDK in-place (DESTDIR=${SDK_DIR}). The final 'install'
          # rule in the top Makefile copies samples to DESTDIR/samples; when
          # DESTDIR is the SDK source tree itself this no-ops to a same-file
          # cp error - we tolerate it because every prior subdir already
          # produced its outputs in $SDK_DIR/{target,bin,ldscripts,toolchain}.
          make -C "$SDK_DIR" DESTDIR="$SDK_DIR" install || true
          test -f "$SDK_DIR/target/include/string.h"
          test -f "$SDK_DIR/target/include/stdlib.h"
          test -f "$SDK_DIR/target/include/elf.h"
          test -f "$SDK_DIR/target/lib/crt1.o"

      - name: Build and install libcxx for PS5
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          export PS5_PAYLOAD_SDK="${PS5_PAYLOAD_SDK}"
          # libcxx.sh downloads the official llvm-project source tarball,
          # builds libcxx + libcxxabi + libunwind for x86_64-sie-ps5 and
          # installs the C++ runtime headers/archives into target/.
          "$PS5_PAYLOAD_SDK/libcxx.sh"
          test -f "$PS5_PAYLOAD_SDK/target/include/c++/v1/cstdint"
          test -f "$PS5_PAYLOAD_SDK/target/lib/libc++.a"

      - name: Verify SDK headers and libs
        run: |
          set -euo pipefail
          echo "PS5_PAYLOAD_SDK=$PS5_PAYLOAD_SDK"
          for h in string.h stdlib.h elf.h; do
            f="$PS5_PAYLOAD_SDK/target/include/$h"
            if [ ! -f "$f" ]; then
              echo "ERROR: missing required header $f" >&2
              find "$PS5_PAYLOAD_SDK" -maxdepth 4 -type d | sort >&2
              exit 1
            fi
            echo "ok: $f"
          done
          ls "$PS5_PAYLOAD_SDK/target/lib" | head
          ls "$PS5_PAYLOAD_SDK/target/include/c++/v1" | head -5 || true

      - name: Stage no-space source copy
        run: |
          set -euo pipefail
          SOURCE_DIR="$GITHUB_WORKSPACE/ci-src"
          rm -rf "$SOURCE_DIR"
          rsync -a --delete "$GITHUB_WORKSPACE/Source Code/" "$SOURCE_DIR/"
          test -f "$SOURCE_DIR/CMakeLists.txt"
          test -f "$SOURCE_DIR/linker.x"
          test -f "$SOURCE_DIR/stubber/toolchain.cmake"

      - name: Configure (CMake / Ninja)
        run: |
          set -euo pipefail
          # The SDK's prospero-* host wrappers (prospero-lld, prospero-llvm-config)
          # must be on PATH because clang resolves the linker for the
          # `x86_64-sie-ps5` target by exec'ing `prospero-lld`.
          echo "${PS5_PAYLOAD_SDK}/bin" >> "$GITHUB_PATH"
          export PATH="${PS5_PAYLOAD_SDK}/bin:$PATH"

          SOURCE_DIR="$GITHUB_WORKSPACE/ci-src"
          BUILD_DIR="$GITHUB_WORKSPACE/build/ps5-release"
          TOOLCHAIN_FILE="$SOURCE_DIR/stubber/toolchain.cmake"
          rm -rf "$BUILD_DIR"

          cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DPS5_PAYLOAD_SDK="$PS5_PAYLOAD_SDK"

      - name: Build daemon ELF
        run: |
          set -euo pipefail
          export PATH="${PS5_PAYLOAD_SDK}/bin:$PATH"
          BUILD_DIR="$GITHUB_WORKSPACE/build/ps5-release"
          cmake --build "$BUILD_DIR" --target daemon --config Release --verbose

      - name: Stage and validate cheat-toolbox.elf artifact
        run: |
          set -euo pipefail
          export PATH="${PS5_PAYLOAD_SDK}/bin:$PATH"

          REPO_ROOT="$GITHUB_WORKSPACE"
          SOURCE_DIR="$REPO_ROOT/ci-src"
          BUILD_DIR="$REPO_ROOT/build/ps5-release"
          ARTIFACT_DIR="$REPO_ROOT/artifacts"

          # daemon.elf is the user-facing PS5 payload. It boots through `_start`
          # (provided by the SDK's crt1.o), opens the cheat toolbox IPC servers,
          # and injects the embedded shellui.elf into SceShellUI via libNineS.
          # shellui.elf is NOT a standalone payload (it has no _start) -- it is
          # consumed only by daemon.elf via .incbin, so we ship daemon.elf alone.
          FINAL_ELF="$SOURCE_DIR/bin/daemon.elf"

          if [ ! -f "$FINAL_ELF" ]; then
            echo "ERROR: expected final ELF not produced: $FINAL_ELF" >&2
            echo "All ELF files under build/ and ci-src/:" >&2
            find "$BUILD_DIR" "$SOURCE_DIR" -type f \( -name "*.elf" -o -name "*.ELF" \) \
              -print -exec ls -lh {} \; -exec file {} \; >&2 || true
            exit 1
          fi

          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          cp "$FINAL_ELF" "$ARTIFACT_DIR/cheat-toolbox.elf"

          ls -lh "$ARTIFACT_DIR/cheat-toolbox.elf"
          file "$ARTIFACT_DIR/cheat-toolbox.elf" \
            | tee "$ARTIFACT_DIR/cheat-toolbox.elf.file.txt"
          sha256sum "$ARTIFACT_DIR/cheat-toolbox.elf" \
            | tee "$ARTIFACT_DIR/cheat-toolbox.elf.sha256"

          if command -v llvm-readelf >/dev/null 2>&1; then
            READELF=llvm-readelf
          else
            READELF=readelf
          fi
          "$READELF" -h "$ARTIFACT_DIR/cheat-toolbox.elf" \
            | tee "$ARTIFACT_DIR/cheat-toolbox.elf.readelf.txt"

          # Hard validation: bail if the ELF is missing, suspiciously small,
          # not actually an ELF, or has an unset entry point (the previous
          # broken artifact had e_entry=0 because crt1.o was not linked).
          test -s "$ARTIFACT_DIR/cheat-toolbox.elf"

          if ! file "$ARTIFACT_DIR/cheat-toolbox.elf" | grep -qi "ELF 64-bit LSB"; then
            echo "ERROR: artifact is not a 64-bit LSB ELF" >&2
            file "$ARTIFACT_DIR/cheat-toolbox.elf" >&2
            exit 1
          fi

          SIZE=$(stat -c%s "$ARTIFACT_DIR/cheat-toolbox.elf")
          if [ "$SIZE" -lt 65536 ]; then
            echo "ERROR: cheat-toolbox.elf is suspiciously small: $SIZE bytes" >&2
            exit 1
          fi

          ENTRY=$("$READELF" -h "$ARTIFACT_DIR/cheat-toolbox.elf" \
            | awk '/Entry point address/ {print $NF}')
          if [ -z "$ENTRY" ] || [ "$ENTRY" = "0x0" ]; then
            echo "ERROR: cheat-toolbox.elf has no entry point (e_entry=$ENTRY)." >&2
            echo "       PS5 payload loaders jump to e_entry; an entry of 0 means" >&2
            echo "       crt1.o was not linked and the ELF will not boot." >&2
            exit 1
          fi
          echo "ok: cheat-toolbox.elf entry point is $ENTRY (size $SIZE bytes)"

          ls -lh "$ARTIFACT_DIR"

      - name: Upload cheat-toolbox.elf artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-toolbox-ps5-elf
          # GitHub Actions always packages an artifact as a .zip on download;
          # the zip will contain `cheat-toolbox.elf` + the sha256/file/readelf
          # metadata files at the top level. Users must unzip and send
          # `cheat-toolbox.elf` to their PS5 payload loader -- not the .zip.
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
