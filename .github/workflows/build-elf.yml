name: Build Cheat Toolbox ELF

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PS5_PAYLOAD_SDK: ${{ github.workspace }}/external/ps5-payload-sdk
  FINAL_ELF_TARGET: daemon
  FINAL_ELF_SOURCE: ${{ github.workspace }}/ci-src/bin/daemon.elf
  ARTIFACT_ELF_NAME: cheat-toolbox.elf

jobs:
  build-elf:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-18 lld-18 llvm-18 llvm-18-dev \
            libc++-18-dev libc++abi-18-dev libunwind-18-dev \
            file build-essential git ca-certificates wget rsync python3
          sudo update-alternatives --install /usr/bin/clang        clang        /usr/bin/clang-18        100 || true
          sudo update-alternatives --install /usr/bin/clang++      clang++      /usr/bin/clang++-18      100 || true
          sudo update-alternatives --install /usr/bin/llvm-config  llvm-config  /usr/bin/llvm-config-18  100 || true
          sudo update-alternatives --install /usr/bin/lld          lld          /usr/bin/lld-18          100 || true
          clang --version
          llvm-config --version

      - name: Clone PS5 payload SDK
        run: |
          set -euo pipefail
          SDK_DIR="${PS5_PAYLOAD_SDK}"
          rm -rf "$SDK_DIR"
          mkdir -p "$(dirname "$SDK_DIR")"
          git clone --depth 1 --recurse-submodules \
            https://github.com/ps5-payload-dev/sdk "$SDK_DIR"
          git -C "$SDK_DIR" submodule update --init --recursive || true

      - name: Cache PS5 SDK target tree (libcxx is expensive to rebuild)
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PS5_PAYLOAD_SDK }}/target
            ${{ env.PS5_PAYLOAD_SDK }}/bin
            ${{ env.PS5_PAYLOAD_SDK }}/ldscripts
            ${{ env.PS5_PAYLOAD_SDK }}/toolchain
          key: ps5-payload-sdk-${{ runner.os }}-${{ hashFiles('external/ps5-payload-sdk/**/Makefile', 'external/ps5-payload-sdk/libcxx.sh') }}

      - name: Build and install PS5 SDK target tree
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          SDK_DIR="${PS5_PAYLOAD_SDK}"
          make -C "$SDK_DIR" DESTDIR="$SDK_DIR" install || true
          test -f "$SDK_DIR/target/include/string.h"
          test -f "$SDK_DIR/target/include/stdlib.h"
          test -f "$SDK_DIR/target/include/elf.h"
          test -f "$SDK_DIR/target/lib/crt1.o"

      - name: Build and install libcxx for PS5
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          export PS5_PAYLOAD_SDK="${PS5_PAYLOAD_SDK}"
          "$PS5_PAYLOAD_SDK/libcxx.sh"
          test -f "$PS5_PAYLOAD_SDK/target/include/c++/v1/cstdint"
          test -f "$PS5_PAYLOAD_SDK/target/lib/libc++.a"

      - name: Verify SDK headers and libs
        run: |
          set -euo pipefail
          echo "PS5_PAYLOAD_SDK=$PS5_PAYLOAD_SDK"
          for h in string.h stdlib.h elf.h; do
            f="$PS5_PAYLOAD_SDK/target/include/$h"
            if [ ! -f "$f" ]; then
              echo "ERROR: missing required header $f" >&2
              find "$PS5_PAYLOAD_SDK" -maxdepth 4 -type d | sort >&2
              exit 1
            fi
            echo "ok: $f"
          done
          test -f "$PS5_PAYLOAD_SDK/target/include/c++/v1/cstdint"

      - name: Stage no-space source copy
        run: |
          set -euo pipefail
          SOURCE_DIR="$GITHUB_WORKSPACE/ci-src"
          rm -rf "$SOURCE_DIR"
          rsync -a --delete "$GITHUB_WORKSPACE/Source Code/" "$SOURCE_DIR/"
          test -f "$SOURCE_DIR/CMakeLists.txt"
          test -f "$SOURCE_DIR/linker.x"
          test -f "$SOURCE_DIR/stubber/toolchain.cmake"

      - name: Configure (CMake / Ninja)
        run: |
          set -euo pipefail
          echo "${PS5_PAYLOAD_SDK}/bin" >> "$GITHUB_PATH"
          export PATH="${PS5_PAYLOAD_SDK}/bin:$PATH"

          SOURCE_DIR="$GITHUB_WORKSPACE/ci-src"
          BUILD_DIR="$GITHUB_WORKSPACE/build/ps5-release"
          TOOLCHAIN_FILE="$SOURCE_DIR/stubber/toolchain.cmake"
          rm -rf "$BUILD_DIR"

          cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DPS5_PAYLOAD_SDK="$PS5_PAYLOAD_SDK"

      - name: Build final PS5 ELF target
        run: |
          set -euo pipefail
          export PATH="${PS5_PAYLOAD_SDK}/bin:$PATH"
          BUILD_DIR="$GITHUB_WORKSPACE/build/ps5-release"
          cmake --build "$BUILD_DIR" --target "$FINAL_ELF_TARGET" --config Release --verbose

      - name: Validate and stage artifact
        run: |
          set -euo pipefail
          export PATH="${PS5_PAYLOAD_SDK}/bin:$PATH"
          ARTIFACT_DIR="$GITHUB_WORKSPACE/artifacts"
          FINAL_ELF="$FINAL_ELF_SOURCE"
          STAGED_ELF="$ARTIFACT_DIR/$ARTIFACT_ELF_NAME"

          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          if [ ! -f "$FINAL_ELF" ]; then
            echo "Final ELF not found at expected path: $FINAL_ELF" >&2
            echo "Available ELF files:" >&2
            find "$GITHUB_WORKSPACE/build/ps5-release" "$GITHUB_WORKSPACE/ci-src" -type f \( -name "*.elf" -o -name "*.ELF" \) -print -exec ls -lh {} \; -exec file {} \;
            exit 1
          fi

          cp "$FINAL_ELF" "$STAGED_ELF"
          test -s "$STAGED_ELF"

          if ! file "$STAGED_ELF" | tee "$ARTIFACT_DIR/$ARTIFACT_ELF_NAME.file.txt" | grep -qi "ELF"; then
            echo "Staged output is not an ELF." >&2
            exit 1
          fi

          ELF_SIZE="$(stat -c%s "$STAGED_ELF")"
          if [ "$ELF_SIZE" -lt 4096 ]; then
            echo "ELF is suspiciously small: $ELF_SIZE bytes" >&2
            exit 1
          fi

          sha256sum "$STAGED_ELF" | tee "$ARTIFACT_DIR/$ARTIFACT_ELF_NAME.sha256"

          if command -v llvm-readelf >/dev/null 2>&1; then
            llvm-readelf -h "$STAGED_ELF" | tee "$ARTIFACT_DIR/$ARTIFACT_ELF_NAME.readelf.txt"
          elif command -v readelf >/dev/null 2>&1; then
            readelf -h "$STAGED_ELF" | tee "$ARTIFACT_DIR/$ARTIFACT_ELF_NAME.readelf.txt"
          else
            echo "Neither llvm-readelf nor readelf is available." >&2
            exit 1
          fi

          strings "$STAGED_ELF" | grep -E -i "cheat|toolbox|controller|pad|shortcut|menu|toggle" | head -100 > "$ARTIFACT_DIR/$ARTIFACT_ELF_NAME.strings.txt" || true

      - name: Upload PS5 ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-toolbox-ps5-elf
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
